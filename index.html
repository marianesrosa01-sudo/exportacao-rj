function DocCheck({docs,onChange,compact}){
  if(!docs||Object.keys(docs).length===0)return null;
  const isTere="anexoVII" in docs;
  const total=Object.keys(docs).length,feitos=Object.values(docs).filter(Boolean).length,pct=total>0?Math.round(feitos/total*100):0;
  const bar=pct===100?"#22c55e":pct>60?"#f59e0b":"#ef4444";
  if(compact)return <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:40,height:4,background:"#e2e8f0",borderRadius:4}}><div style={{height:"100%",width:pct+"%",background:bar,borderRadius:4}}/></div><span style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>{feitos}/{total}</span></div>;
  const grupos=[{t:"Comerciais",keys:["invoice","packing"]},{t:"Regulatorios",keys:["co","ca","due",...("pallet" in docs?["pallet"]:[])]}, ...(isTere?[{t:"Terebintina",keys:["anexoVII","mdgf","dca"]}]:[])];
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"10px 14px",background:"#f8fafc",borderRadius:8}}><div style={{flex:1,height:6,background:"#e2e8f0",borderRadius:4}}><div style={{height:"100%",width:pct+"%",background:bar,borderRadius:4}}/></div><span style={{fontSize:12,fontWeight:700,color:"#475569"}}>{feitos}/{total} ({pct}%)</span></div>
    {grupos.map(g=><div key={g.t} style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{g.t}</div>{g.keys.filter(k=>k in docs).map(k=><label key={k} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"8px 12px",borderRadius:8,background:docs[k]?"#f0fdf4":"#f8fafc",border:"1px solid "+(docs[k]?"#bbf7d0":"#e2e8f0"),marginBottom:5}}><input type="checkbox" checked={docs[k]} onChange={e=>onChange&&onChange(k,e.target.checked)} style={{accentColor:"#22c55e",width:15,height:15}}/><span style={{fontSize:13,fontWeight:500,color:docs[k]?"#15803d":"#475569"}}>{LDOC[k]}</span>{docs[k]&&<span style={{marginLeft:"auto",fontSize:11,color:"#22c55e",fontWeight:700}}>Emitido</span>}</label>)}</div>)}

        <input value={n.numero} onChange={e=>upd(n.id,"numero",e.target.value)} placeholder="NF-000123" style={inp}/>

function Arquivos({processoId}){
  const [arqs,setArqs]=useState([]);const [loading,setLoading]=useState(false);const [uploading,setUploading]=useState(false);const fileRef=useRef();
  useEffect(()=>{if(processoId)load();},[processoId]);
  const load=async()=>{setLoading(true);const{data}=await sb.from("arquivos").select("*").eq("processo_id",processoId).order("created_at");if(data)setArqs(data);setLoading(false);};
  const upload=async(e)=>{const files=Array.from(e.target.files);setUploading(true);for(const file of files){const path=processoId+"/"+Date.now()+"_"+file.name;const{error}=await sb.storage.from("arquivos").upload(path,file);if(!error){const{data:u}=sb.storage.from("arquivos").getPublicUrl(path);await sb.from("arquivos").insert({processo_id:processoId,nome:file.name,tamanho:file.size,tipo:file.type,url:u.publicUrl});}}await load();setUploading(false);e.target.value="";};
  const remover=async(arq)=>{if(!window.confirm("Remover "+arq.nome+"?"))return;await sb.from("arquivos").delete().eq("id",arq.id);setArqs(a=>a.filter(x=>x.id!==arq.id));};
  const icon=t=>t&&t.startsWith("image/")?"🖼":t==="application/pdf"?"📕":"📎";
  if(!processoId)return <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:8,padding:"12px 16px",fontSize:12,color:"#92400e"}}>Salve o processo primeiro para anexar arquivos.</div>;
  return <div>
    <div onClick={()=>!uploading&&fileRef.current.click()} style={{border:"2px dashed #e2e8f0",borderRadius:10,padding:"28px 20px",textAlign:"center",cursor:"pointer",marginBottom:14,background:"#fafafa"}}>
      <div style={{fontSize:28,marginBottom:8}}>{uploading?"⏳":"📎"}</div>
      <div style={{color:"#475569",fontSize:13,fontWeight:600}}>{uploading?"Enviando...":"Clique para anexar arquivos"}</div>
    </div>
    <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={upload}/>
    {loading&&<div style={{textAlign:"center",color:"#94a3b8",padding:20}}>Carregando...</div>}
    {!loading&&arqs.length===0&&<div style={{textAlign:"center",color:"#94a3b8",fontSize:13,padding:20}}>Nenhum arquivo anexado</div>}
    {arqs.map(arq=><div key={arq.id} style={{display:"flex",alignItems:"center",gap:10,border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 14px",marginBottom:8,background:"#fff"}}>
      <span style={{fontSize:20}}>{icon(arq.tipo)}</span>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{arq.nome}</div><div style={{fontSize:11,color:"#94a3b8"}}>{arq.tamanho?(arq.tamanho/1024).toFixed(1)+" KB":""}</div></div>
      <a href={arq.url} target="_blank" rel="noreferrer" style={{background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:600,textDecoration:"none"}}>Baixar</a>
      <button onClick={()=>remover(arq)} style={{background:"none",border:"none",color:"#94a3b8",fontSize:16,cursor:"pointer"}}>x</button>
    </div>)}
  </div>;
}

function Tabela({rows,cols,onEdit}){
  if(!rows||!rows.length)return <div style={{textAlign:"center",padding:48,color:"#94a3b8",fontSize:13}}>Nenhum processo</div>;
  const c=cols||{};

  const TD=({children,s})=><td style={{padding:"11px 14px",borderBottom:"1px solid #f1f5f9",verticalAlign:"middle",fontSize:13,...s}}>{children}</td>;
  return <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #e2e8f0"}}>

        {c.dias&&<TH ch="Vence"/>}

        {c.status&&<TH ch="Status"/>}

        <TD><span style={{color:"#2563eb",fontWeight:700,fontSize:12}}>{p.proforma}</span><div style={{fontSize:10,color:"#94a3b8"}}>{p.empresa}</div></TD>

        {c.prontidao&&<TD>{p.prontidao?fDate(p.prontidao):<Pill color="amber">Indefinida</Pill>}</TD>}
        <TD s={{fontWeight:700,color:"#16a34a"}}>{fVal(p.valor,p.moeda)}</TD>
        {c.carg&&<TD>{p.mercado==="MI"?<Pill color="gray">N/A</Pill>:p.carg?<span style={{fontSize:12,color:"#475569"}}>{fDate(p.carg)}</span>:<Pill color="red">Sem reserva</Pill>}</TD>}
        {c.pgm&&<TD s={{fontSize:12,color:"#475569"}}>{fDate(p.pgm)}</TD>}
        {c.dias&&<TD><DB days={dDiff(p.pgm)}/></TD>}

        {c.nf&&<TD>{(p.notas_fiscais||[]).length>0?<Pill color="blue">{(p.notas_fiscais||[]).length} NF</Pill>:<span style={{color:"#94a3b8",fontSize:11}}>-</span>}</TD>}
        {c.status&&<TD><Badge status={p.status}/></TD>}

      </tr>)}</tbody>
    </table>
  </div>;
}

      </div>}

      {tab==="docs"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800}}>📄 Documentos Pendentes — Exportacao</h2></div>
        {sDocs.length===0&&<div style={{textAlign:"center",padding:60,color:"#94a3b8"}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontWeight:700}}>Todos os documentos em dia!</div></div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {sDocs.map(p=>{const miss=Object.entries(p.docs||{}).filter(([,v])=>!v).map(([k])=>LDOC[k]);const done=Object.entries(p.docs||{}).filter(([,v])=>v).map(([k])=>LDOC[k]);return <div key={p.id} onClick={()=>setModal(p)} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"16px 20px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div><span style={{color:"#2563eb",fontWeight:700}}>{p.proforma}</span><span style={{color:"#475569",marginLeft:10}}>{p.cliente}</span></div>
              <div style={{display:"flex",gap:8}}><span style={{fontWeight:700,color:"#16a34a"}}>{fVal(p.valor,p.moeda)}</span><Badge status={p.status}/></div>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
              {miss.length>0&&<div><div style={{fontSize:10,fontWeight:700,color:"#dc2626",textTransform:"uppercase",marginBottom:5}}>Pendente</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{miss.map(m=><Pill key={m} color="red">{m}</Pill>)}</div></div>}
              {done.length>0&&<div><div style={{fontSize:10,fontWeight:700,color:"#16a34a",textTransform:"uppercase",marginBottom:5}}>Emitido</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{done.map(d=><Pill key={d} color="green">{d}</Pill>)}</div></div>}
            </div>
            <DocCheck docs={p.docs||{}} compact/>
          </div>;})}
        </div>
      </div>}

      {tab==="recebimentos"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800}}>💰 Recebimentos — Mercado Externo</h2></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:24}}>
          <KPI icon="🇺🇸" label="A Receber USD" value={"USD "+tUSD.toLocaleString("pt-BR")} color="blue"/>
          <KPI icon="🇪🇺" label="A Receber EUR" value={"EUR "+tEUR.toLocaleString("pt-BR")} color="blue"/>
          <KPI icon="🔴" label="Vencidos" value={"USD "+tVencUSD.toLocaleString("pt-BR")} sub={venc.filter(p=>p.moeda!=="BRL").length+" processos"} color={tVencUSD>0?"red":"green"}/>
        </div>
        {venc.filter(p=>p.moeda!=="BRL").length>0&&<div style={{marginBottom:24}}><div style={{fontWeight:700,color:"#dc2626",fontSize:14,marginBottom:10}}>🔴 Vencidos ME</div><Tabela rows={venc.filter(p=>p.moeda!=="BRL")} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>}
        <div style={{marginBottom:24}}><div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📅 A receber em {TODAY.toLocaleString("pt-BR",{month:"long",year:"numeric"})}</div><Tabela rows={mes.filter(p=>p.moeda!=="BRL").sort((a,b)=>new Date(a.pgm)-new Date(b.pgm))} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>
        <div><div style={{fontWeight:700,color:"#475569",fontSize:14,marginBottom:10}}>📋 Todos Pendentes ME</div><Tabela rows={meData.filter(p=>p.status!=="PAGO").sort((a,b)=>new Date(a.pgm||"9999")-new Date(b.pgm||"9999"))} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>
      </div>}

      {tab==="mi"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800}}>🏭 Mercado Interno</h2><p style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{miData.length} processos · R$ {tBRL.toLocaleString("pt-BR",{minimumFractionDigits:0})} a receber</p></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:20}}>
          <KPI icon="🇧🇷" label="A Receber BRL" value={"R$ "+tBRL.toLocaleString("pt-BR",{minimumFractionDigits:0})} color="purple"/>
          <KPI icon="🔴" label="Vencidos MI" value={"R$ "+tVencBRL.toLocaleString("pt-BR",{minimumFractionDigits:0})} sub={venc.filter(p=>p.moeda==="BRL").length+" processos"} color={tVencBRL>0?"red":"green"}/>
          <KPI icon="📅" label="Vence este Mes" value={"R$ "+mes.filter(p=>p.moeda==="BRL").reduce((a,p)=>a+(p.valor||0),0).toLocaleString("pt-BR",{minimumFractionDigits:0})} sub={mes.filter(p=>p.moeda==="BRL").length+" processos"} color="amber"/>
        </div>
        {venc.filter(p=>p.moeda==="BRL").length>0&&<div style={{marginBottom:20}}><div style={{fontWeight:700,color:"#dc2626",fontSize:14,marginBottom:10}}>🔴 Vencidos MI</div><Tabela rows={venc.filter(p=>p.moeda==="BRL")} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>}
        <div style={{marginBottom:20}}><div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📅 A receber em {TODAY.toLocaleString("pt-BR",{month:"long",year:"numeric"})}</div><Tabela rows={mes.filter(p=>p.moeda==="BRL").sort((a,b)=>new Date(a.pgm)-new Date(b.pgm))} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>
        <div><div style={{fontWeight:700,color:"#475569",fontSize:14,marginBottom:10}}>📋 Todos MI</div><Tabela rows={miData.sort((a,b)=>new Date(a.pgm||"9999")-new Date(b.pgm||"9999"))} cols={{pgm:true,dias:true,nf:true,status:true}} onEdit={setModal}/></div>
      </div>}

      {tab==="todos"&&<div>
        <div style={{marginBottom:16}}><h2 style={{fontSize:18,fontWeight:800}}>📋 Todos os Processos</h2></div>
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
          <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
            <input placeholder="🔍 Buscar proforma, cliente ou produto..." value={busca} onChange={e=>setBusca(e.target.value)} style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:13,flex:1,minWidth:180,fontFamily:"inherit",outline:"none"}}/>
            <button onClick={()=>setShowFilters(s=>!s)} style={{background:showFilters?"#2563eb":"#f1f5f9",color:showFilters?"#fff":"#475569",border:"1px solid "+(showFilters?"#2563eb":"#e2e8f0"),borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
              Filtros {(fMkt!=="Todos"||fCli!=="Todos"||fSt!=="Todos"||fProd!=="Todos"||fCargDe||fCargAte)?"●":""}
            </button>
            <button onClick={()=>{setFMkt("Todos");setFCli("Todos");setFSt("Todos");setFProd("Todos");setFCargDe("");setFCargAte("");setBusca("");}} style={{background:"#f1f5f9",color:"#94a3b8",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Limpar</button>
          </div>
          {showFilters&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,paddingTop:10,borderTop:"1px solid #f1f5f9"}}>
            <div><label style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.6,display:"block",marginBottom:4}}>Mercado</label>
              <select value={fMkt} onChange={e=>setFMkt(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",fontSize:12,fontFamily:"inherit",background:"#fff"}}>
                <option value="Todos">Todos</option><option value="ME">ME - Exportacao</option><option value="MI">MI - Interno</option>
              </select>
            </div>
            <div><label style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.6,display:"block",marginBottom:4}}>Cliente</label>
              <select value={fCli} onChange={e=>setFCli(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",fontSize:12,fontFamily:"inherit",background:"#fff"}}>
                {clientes.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div><label style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.6,display:"block",marginBottom:4}}>Produto</label>
              <select value={fProd} onChange={e=>setFProd(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",fontSize:12,fontFamily:"inherit",background:"#fff"}}>
                {produtos.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            <div><label style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.6,display:"block",marginBottom:4}}>Status</label>
              <select value={fSt} onChange={e=>setFSt(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",fontSize:12,fontFamily:"inherit",background:"#fff"}}>
                <option value="Todos">Todos</option>{SOPT.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div><label style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.6,display:"block",marginBottom:4}}>Carregamento De</label>
              <input type="date" value={fCargDe} onChange={e=>setFCargDe(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
            </div>
            <div><label style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.6,display:"block",marginBottom:4}}>Carregamento Ate</label>
              <input type="date" value={fCargAte} onChange={e=>setFCargAte(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
            </div>
          </div>}
        </div>
        <Tabela rows={lista} cols={{mercado:true,prontidao:true,carg:true,pgm:true,docs:true,nf:true,status:true}} onEdit={setModal}/>
        <div style={{marginTop:10,fontSize:11,color:"#94a3b8",textAlign:"right"}}>{lista.length} de {data.length} processos · {lista.filter(p=>p.status!=="PAGO").length} pendentes</div>
      </div>}

    </div>}
    {modal&&<Modal proc={modal} onClose={()=>setModal(null)} onSave={saveP} saving={saving}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
