function NotasFiscais({notas, onChange}){
  const [expandido, setExpandido] = useState(false);

  const addNota = () => {
    const nova = {id:Date.now(), numero:"", valor:""};
    onChange([...(notas||[]), nova]);
    setExpandido(true);
  };
  const updateNota = (id,campo,val) => onChange((notas||[]).map(n=>n.id===id?{...n,[campo]:val}:n));
  const removeNota = (id) => onChange((notas||[]).filter(n=>n.id!==id));

  const inp={border:,borderRadius:7,padding:"7px 10px",fontSize:12,fontFamily:"inherit",outline:"none",background:"#fafafa"};

  return <div style={{borderTop:,paddingTop:16,marginTop:4}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:expandido&&notas?.length>0?12:0}}>
      <button onClick={()=>setExpandido(e=>!e)} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",padding:0}}>
        <span style={{fontSize:13,fontWeight:700,color:C.tx}}>🧾 Notas Fiscais</span>
        {notas?.length>0&&<span style={{background:"#eff6ff",color:C.bl,border:"1px solid #bfdbfe",borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:700}}>{notas.length} nota{notas.length>1?"s":""}</span>}
        {totalBRL>0&&<span style={{fontSize:12,color:C.gr,fontWeight:600}}>{fBRL(totalBRL)}</span>}
        <span style={{fontSize:10,color:C.mu,marginLeft:2}}>{expandido?"▲":"▼"}</span>
      </button>
      <button onClick={addNota} style={{background:"#eff6ff",color:C.bl,border:"1px solid #bfdbfe",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Adicionar NF</button>
    </div>

    {expandido&&(notas||[]).length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:"16px 0"}}>Nenhuma nota fiscal cadastrada</div>}

    {expandido&&(notas||[]).length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
      {/* header */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 32px",gap:8,paddingBottom:6,borderBottom:}}>
        <span style={{fontSize:10,fontWeight:700,color:C.mu,textTransform:"uppercase",letterSpacing:.6}}>Número da NF</span>
        <span style={{fontSize:10,fontWeight:700,color:C.mu,textTransform:"uppercase",letterSpacing:.6}}>Valor (R$)</span>
        <span/>
      </div>
      {(notas||[]).map(n=><div key={n.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 32px",gap:8,alignItems:"center"}}>
        <input value={n.numero} onChange={e=>updateNota(n.id,"numero",e.target.value)} placeholder="Ex: NF-000123" style={{...inp,width:"100%",boxSizing:"border-box"}}/>
        <input type="number" value={n.valor} onChange={e=>updateNota(n.id,"valor",e.target.value)} placeholder="0,00" style={{...inp,width:"100%",boxSizing:"border-box"}}/>
        <button onClick={()=>removeNota(n.id)} style={{background:"none",border:"none",color:C.mu,cursor:"pointer",fontSize:16,padding:0,textAlign:"center"}}>✕</button>
      </div>)}

function Arquivos({processoId}){

  const upload=async(e)=>{const files=Array.from(e.target.files);setUploading(true);for(const file of files){const path=;const{error}=await sb.storage.from("arquivos").upload(path,file);if(!error){const{data:u}=sb.storage.from("arquivos").getPublicUrl(path);await sb.from("arquivos").insert({processo_id:processoId,nome:file.name,tamanho:file.size,tipo:file.type,url:u.publicUrl});}}await load();setUploading(false);e.target.value="";};

    </div>
    <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={upload}/>
    {loading&&<div style={{textAlign:"center",color:C.mu,padding:20}}>Carregando...</div>}

      {arqs.map(arq=><div key={arq.id} style={{display:"flex",alignItems:"center",gap:10,border:,borderRadius:8,padding:"10px 14px",background:C.w}}>
        <span style={{fontSize:22}}>{icon(arq.tipo)}</span>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:C.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{arq.nome}</div><div style={{fontSize:11,color:C.mu}}>{arq.tamanho?(arq.tamanho/1024).toFixed(1)+" KB":""} · {new Date(arq.created_at).toLocaleDateString("pt-BR")}</div></div>
        <a href={arq.url} target="_blank" rel="noreferrer" style={{background:"#eff6ff",color:C.bl,border:"1px solid #bfdbfe",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:600,textDecoration:"none"}}>⬇ Baixar</a>
        <button onClick={()=>remover(arq)} style={{background:"none",border:"none",color:C.mu,fontSize:16,cursor:"pointer",padding:4}}>✕</button>
      </div>)}
    </div>
  </div>;
}

// ── Modal ───────────────────────────────────────────────────────────
function Modal({proc,onClose,onSave,loading}){
  const [f,setF]=useState({...proc, moeda: proc.moeda||"USD", notas_fiscais: proc.notas_fiscais||[]});
  const [st,setSt]=useState("dados");
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setD=(k,v)=>setF(p=>({...p,docs:{...p.docs,[k]:v}}));
  const inp={width:"100%",boxSizing:"border-box",border:,borderRadius:8,padding:"9px 12px",fontSize:13,fontFamily:"inherit",color:C.tx,background:"#fafafa",outline:"none"};
  const lbl={fontSize:11,color:C.sub,fontWeight:600,letterSpacing:.5,textTransform:"uppercase",display:"block",marginBottom:5};
  const simbolo=f.moeda==="EUR"?"€":"$";

  return <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(15,23,42,0.5)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.w,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"94vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.18)",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"22px 24px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{fontSize:11,color:C.bl,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{f.empresa} · {f.proforma||"Novo processo"}</div>
            <div style={{fontSize:18,fontWeight:800,color:C.tx}}>{f.cliente||"—"}</div>
            <div style={{fontSize:12,color:C.sub,marginTop:2}}>{f.produto}</div>
          </div>
          <button onClick={onClose} style={{background:"#f1f5f9",border:"none",width:32,height:32,borderRadius:"50%",fontSize:16,cursor:"pointer",color:C.sub}}>✕</button>
        </div>
        <div style={{display:"flex",gap:4,borderBottom:,marginLeft:-24,marginRight:-24,paddingLeft:24}}>
          {[["dados","📋 Dados"],["docs","✅ Documentos"],["arquivos","📎 Arquivos"]].map(([id,lb])=><button key={id} onClick={()=>setSt(id)} style={{background:"none",border:"none",borderBottom:,color:st===id?C.bl:C.mu,padding:"10px 16px",fontSize:12,fontWeight:st===id?700:500,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{lb}</button>)}
        </div>
      </div>

      <div style={{padding:"20px 24px",flex:1,overflowY:"auto"}}>
        {st==="dados"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {[["cliente","Cliente","text","1/span 2"],["produto","Produto","text","1/span 2"],["destino","País Destino","text"],["incoterm","Incoterm","inc"],["qtd","Quantidade","number"]].map(([k,lb,type,gc])=><div key={k} style={{gridColumn:gc}}><label style={lbl}>{lb}</label>{type==="inc"?<select value={f[k]||"FOB"} onChange={e=>set(k,e.target.value)} style={inp}>{["FOB","CIF","CFR","EXW","DAP","DDP"].map(o=><option key={o}>{o}</option>)}</select>:<input type={type} value={f[k]||""} onChange={e=>set(k,e.target.value)} style={inp}/>}</div>)}

            {/* Moeda + Valor lado a lado */}
            <div><label style={lbl}>Moeda</label>
              <select value={f.moeda||"USD"} onChange={e=>set("moeda",e.target.value)} style={inp}>
                <option value="USD">🇺🇸 USD — Dólar</option>
                <option value="EUR">🇪🇺 EUR — Euro</option>
              </select>
            </div>
            <div><label style={lbl}>Valor ({f.moeda==="EUR"?"€":"$"})</label>
              <input type="number" value={f.valor||""} onChange={e=>set("valor",e.target.value)} style={inp}/>
            </div>

            {[["prazo","Prazo Pgto (dias)","number"],["termos","Termos","ter"],["prontidao","Previsão Prontidão","date"],["carg","Data Carregamento","date"],["bl","Data BL","date"],["pgm","Prev. Pagamento","date"]].map(([k,lb,type,gc])=><div key={k} style={{gridColumn:gc}}><label style={lbl}>{lb}</label>{type==="ter"?<select value={f[k]||"DIAS DO BL"} onChange={e=>set(k,e.target.value)} style={inp}>{["DIAS DO BL","NO BL","100% ANTECIPADO","50% ANTECIPADO","PARCELADO"].map(o=><option key={o}>{o}</option>)}</select>:<input type={type} value={f[k]||""} onChange={e=>set(k,e.target.value)} style={inp}/>}</div>)}

            <div style={{gridColumn:"1/span 2"}}><label style={lbl}>Status Pagamento</label><select value={f.status} onChange={e=>set("status",e.target.value)} style={inp}>{SOPT.map(s=><option key={s}>{s}</option>)}</select></div>
            <div style={{gridColumn:"1/span 2"}}><label style={lbl}>Obs. Prazos/Pagamentos</label><textarea value={f.obs_prazo||""} onChange={e=>set("obs_prazo",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></div>
            <div style={{gridColumn:"1/span 2"}}><label style={lbl}>Obs. Gerais</label><textarea value={f.obs||""} onChange={e=>set("obs",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></div>
          </div>

          {/* Notas Fiscais */}
          <div style={{marginTop:16}}>
            <NotasFiscais notas={f.notas_fiscais} onChange={v=>set("notas_fiscais",v)}/>
          </div>
        </div>}

        {st==="docs"&&<DocCheck docs={f.docs} onChange={setD}/>}
        {st==="arquivos"&&<Arquivos processoId={f.id}/>}
      </div>

      <div style={{padding:"16px 24px",borderTop:,display:"flex",gap:8,justifyContent:"flex-end",background:"#fafafa",borderRadius:"0 0 16px 16px"}}>
        <button onClick={onClose} style={{background:C.w,color:C.sub,border:,borderRadius:8,padding:"9px 20px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
        <button onClick={()=>onSave(f)} disabled={loading} style={{background:C.bl,color:"#fff",border:"none",borderRadius:8,padding:"9px 22px",fontWeight:700,fontSize:13,cursor:"pointer"}}>{loading?"Salvando...":"Salvar Processo"}</button>
      </div>
    </div>
  </div>;
}

// ── Tabela ──────────────────────────────────────────────────────────
function Tabela({rows,cols={},onEdit}){
  if(!rows.length)return <div style={{textAlign:"center",padding:48,color:C.mu,fontSize:13}}>Nenhum processo encontrado</div>;
  const TH=({ch})=><th style={{padding:"10px 14px",fontSize:11,fontWeight:700,color:C.mu,textTransform:"uppercase",letterSpacing:.6,textAlign:"left",borderBottom:,background:"#fafafa",whiteSpace:"nowrap"}}>{ch}</th>;
  const TD=({children,s})=><td style={{padding:"11px 14px",borderBottom:,verticalAlign:"middle",fontSize:13,...s}}>{children}</td>;
  return <div style={{overflowX:"auto",borderRadius:10,border:}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>
    <TH ch="Proforma"/><TH ch="Cliente"/><TH ch="Produto"/>
    {cols.prontidao&&<TH ch="Prontidão"/>}
    <TH ch="Valor"/>
    {cols.carg&&<TH ch="Carregamento"/>}
    {cols.pgm&&<TH ch="Pgto Prev."/>}
    {cols.dias&&<TH ch="Vence em"/>}
    {cols.docs&&<TH ch="Docs"/>}
    {cols.nf&&<TH ch="NFs"/>}
    {cols.status&&<TH ch="Status"/>}
    <TH ch=""/>
  </tr></thead><tbody>
    {rows.map((p,i)=><tr key={p.id||p.proforma} style={{background:i%2===0?C.w:"#fafafa",cursor:"pointer"}} onClick={()=>onEdit(p)} onMouseEnter={e=>e.currentTarget.style.background="#f0f7ff"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?C.w:"#fafafa"}>
      <TD><span style={{color:C.bl,fontWeight:700,fontSize:12}}>{p.proforma}</span><div style={{fontSize:10,color:C.mu,marginTop:1}}>{p.empresa}</div></TD>
      <TD s={{fontWeight:600}}>{p.cliente}</TD>
      <TD s={{color:C.sub,maxWidth:150}}><span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150}}>{p.produto}</span></TD>
      {cols.prontidao&&<TD>{p.prontidao?<span style={{fontSize:12}}>{fDate(p.prontidao)}</span>:<Pill color="amber">Indefinida</Pill>}</TD>}
      <TD>
        <span style={{fontWeight:700,color:C.gr}}>{fMoeda(p.valor,p.moeda||"USD")}</span>
        {p.moeda==="EUR"&&<div style={{fontSize:10,color:C.mu}}>EUR</div>}
      </TD>
      {cols.carg&&<TD>{p.carg?<span style={{fontSize:12,color:C.sub}}>{fDate(p.carg)}</span>:<Pill color="red">Sem reserva</Pill>}</TD>}
      {cols.pgm&&<TD s={{fontSize:12,color:C.sub}}>{fDate(p.pgm)}</TD>}
      {cols.dias&&<TD><DB days={dDiff(p.pgm)}/></TD>}
      {cols.docs&&<TD><DocCheck docs={p.docs||{}} compact/></TD>}
      {cols.nf&&<TD>{(p.notas_fiscais||[]).length>0?<Pill color="blue">{(p.notas_fiscais||[]).length} NF{(p.notas_fiscais||[]).length>1?"s":""}</Pill>:<span style={{color:C.mu,fontSize:11}}>—</span>}</TD>}
      {cols.status&&<TD><Badge status={p.status}/></TD>}
      <TD><button onClick={e=>{e.stopPropagation();onEdit(p);}} style={{background:"#f1f5f9",color:C.bl,border:"none",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Abrir</button></TD>
    </tr>)}
  </tbody></table></div>;
}

      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setModal(emptyP)} style={{background:C.bl,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,fontSize:12,cursor:"pointer"}}>＋ Novo Processo</button>

    {/* nav */}
    <div style={{background:C.w,borderBottom:,padding:"0 24px",display:"flex",overflowX:"auto",position:"sticky",top:56,zIndex:99}}>
      {NAV.map(n=><button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",borderBottom:,color:tab===n.id?C.bl:C.sub,padding:"12px 16px",fontSize:13,fontWeight:tab===n.id?700:500,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
        <span>{n.icon}</span>{n.label}
        {n.alert>0&&<span style={{background:"#fef2f2",color:C.rd,border:"1px solid #fecaca",borderRadius:20,padding:"0 6px",fontSize:10,fontWeight:700}}>{n.alert}</span>}
      </button>)}
    </div>

    {!dbLoad&&<div style={{padding:"24px",maxWidth:1400,margin:"0 auto"}}>

      {/* DASHBOARD */}
      {tab==="dashboard"&&<div>
        <div style={{marginBottom:20}}>
          <h1 style={{fontSize:20,fontWeight:800,color:C.tx}}>Painel Geral</h1>
          <p style={{fontSize:13,color:C.mu,marginTop:4}}>{TODAY.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:20,background:C.w,borderRadius:10,padding:4,border:,width:"fit-content"}}>
          {DTABS.map(t=><button key={t.id} onClick={()=>setDashTab(t.id)} style={{background:dashTab===t.id?C.bl:"none",color:dashTab===t.id?"#fff":C.sub,border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,fontWeight:dashTab===t.id?700:500,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.label}</button>)}
        </div>

        {dashTab==="geral"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14}}>
          <KPI icon="📦" label="Total de Processos" value={data.length} sub={} color="blue"/>
          <KPI icon="🇺🇸" label="A Receber USD" value={"$"+totalUSD.toLocaleString("pt-BR")} sub={} color="blue"/>
          <KPI icon="🇪🇺" label="A Receber EUR" value={"€"+totalEUR.toLocaleString("pt-BR")} sub={} color="blue"/>
          <KPI icon="📅" label="Vence este Mês" value={tMes>0?("$"+tMes.toLocaleString("pt-BR")):"—"} sub={} color="green" onClick={()=>setTab("recebimentos")}/>
          <KPI icon="🚨" label="Pagamentos Vencidos" value={venc.length} sub={tVenc>0?"$"+tVenc.toLocaleString("pt-BR"):""} color={tVenc>0?"red":"green"} onClick={()=>setTab("recebimentos")}/>
          <KPI icon="🚢" label="Sem Booking" value={sRes.length} sub="aguardando reserva" color={sRes.length>0?"red":"green"} onClick={()=>setTab("booking")}/>
          <KPI icon="📄" label="Docs Pendentes" value={sDocs.length} sub="processos incompletos" color={sDocs.length>0?"amber":"green"} onClick={()=>setTab("docs")}/>
        </div>}

        {dashTab==="alertas"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
          {sRes.length===0&&venc.length===0&&sDocs.length===0&&<div style={{textAlign:"center",padding:60}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontWeight:700,color:C.sub,fontSize:15}}>Nenhum alerta no momento!</div></div>}
          {venc.length>0&&<div style={{background:C.w,border:"1px solid #fecaca",borderRadius:12,overflow:"hidden"}}><div style={{background:"#fef2f2",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:700,color:C.rd,fontSize:14}}>🔴 Pagamentos Vencidos</div><Pill color="red">{venc.length}</Pill></div><div style={{padding:16}}><Tabela rows={venc} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div></div>}
          {sRes.length>0&&<div style={{background:C.w,border:"1px solid #fed7aa",borderRadius:12,overflow:"hidden"}}><div style={{background:"#fff7ed",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:700,color:"#c2410c",fontSize:14}}>🚢 Pendentes de Booking</div><Pill color="amber">{sRes.length}</Pill></div><div style={{padding:16}}><Tabela rows={sRes} cols={{prontidao:true,docs:true}} onEdit={setModal}/></div></div>}
          {sDocs.length>0&&<div style={{background:C.w,border:,borderRadius:12,overflow:"hidden"}}><div style={{background:"#fefce8",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:700,color:C.am,fontSize:14}}>📄 Documentos Pendentes</div><Pill color="amber">{sDocs.length}</Pill></div><div style={{padding:16}}><Tabela rows={sDocs} cols={{carg:true,docs:true,status:true}} onEdit={setModal}/></div></div>}
        </div>}

        {dashTab==="financeiro"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{background:C.w,border:,borderRadius:12,padding:"18px 20px"}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>💰 A Receber este Mês</div>
            {mes.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:13,padding:20}}>Sem vencimentos este mês</div>}
            {mes.sort((a,b)=>new Date(a.pgm)-new Date(b.pgm)).slice(0,6).map(p=><div key={p.id} onClick={()=>setModal(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:,cursor:"pointer"}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.bl}}>{p.proforma}</div><div style={{fontSize:11,color:C.mu}}>{p.cliente}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:C.gr}}>{fMoeda(p.valor,p.moeda)}</div><DB days={dDiff(p.pgm)}/></div>
            </div>)}
          </div>
          <div style={{background:C.w,border:,borderRadius:12,padding:"18px 20px"}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>📊 Resumo por Moeda</div>
            {[["🇺🇸 A Receber USD","$"+totalUSD.toLocaleString("pt-BR"),C.bl],["🇪🇺 A Receber EUR","€"+totalEUR.toLocaleString("pt-BR"),"#7c3aed"],["🔴 Vencido","$"+tVenc.toLocaleString("pt-BR"),C.rd],["📅 Receber no Mês","$"+tMes.toLocaleString("pt-BR"),C.gr]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}><span style={{fontSize:13,color:C.sub}}>{l}</span><span style={{fontSize:14,fontWeight:700,color:c}}>{v}</span></div>)}
          </div>
        </div>}

        {dashTab==="clientes"&&<div style={{background:C.w,border:,borderRadius:12,padding:"18px 20px"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>📊 Volume por Cliente</div>
          {Object.entries(data.reduce((a,p)=>{a[p.cliente]=(a[p.cliente]||0)+(p.valor||0);return a},{})).sort((a,b)=>b[1]-a[1]).map(([cli,val])=>{const pct=tGeral>0?val/tGeral*100:0;return <div key={cli} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
            <div style={{width:130,fontSize:13,fontWeight:600,flexShrink:0}}>{cli}</div>
            <div style={{flex:1,height:6,background:"#f1f5f9",borderRadius:4}}><div style={{height:"100%",width:,background:C.bl,borderRadius:4}}/></div>
            <div style={{width:80,textAlign:"right",fontSize:13,fontWeight:700,color:C.gr,flexShrink:0}}>{"$"+val.toLocaleString("pt-BR")}</div>
            <div style={{width:36,textAlign:"right",fontSize:11,color:C.mu,flexShrink:0}}>{pct.toFixed(0)}%</div>
          </div>;})}
        </div>}
      </div>}

      {/* BOOKING */}
      {tab==="booking"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800}}>🚢 Booking Pendente</h2><p style={{fontSize:13,color:C.mu,marginTop:4}}>Processos sem data de carregamento e sem BL confirmado</p></div>
        {sRes.length>0&&<div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>⚠️</span><div><span style={{fontWeight:700,color:"#c2410c",fontSize:13}}>{sRes.length} processo{sRes.length>1?"s":""} aguardando reserva</span><span style={{color:C.sub,fontSize:12,marginLeft:8}}>Valor: {fMoeda(sRes.reduce((a,p)=>a+(p.valor||0),0),"USD")}</span></div></div>}
        <Tabela rows={sRes} cols={{prontidao:true,carg:true,docs:true,nf:true}} onEdit={setModal}/>
      </div>}

      {/* DOCS */}
      {tab==="docs"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800}}>📄 Documentos Pendentes</h2><p style={{fontSize:13,color:C.mu,marginTop:4}}>Clique em qualquer processo para atualizar o checklist</p></div>
        {sDocs.length===0&&<div style={{textAlign:"center",padding:60,color:C.mu}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontWeight:700,fontSize:15}}>Todos os documentos em dia!</div></div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {sDocs.map(p=>{const miss=Object.entries(p.docs||{}).filter(([,v])=>!v).map(([k])=>LDOC[k]);const done=Object.entries(p.docs||{}).filter(([,v])=>v).map(([k])=>LDOC[k]);return <div key={p.id} onClick={()=>setModal(p)} style={{background:C.w,border:,borderRadius:10,padding:"16px 20px",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.06)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div><span style={{color:C.bl,fontWeight:700}}>{p.proforma}</span><span style={{color:C.sub,marginLeft:10}}>{p.cliente}</span></div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontWeight:700,color:C.gr}}>{fMoeda(p.valor,p.moeda)}</span><Badge status={p.status}/></div>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
              {miss.length>0&&<div><div style={{fontSize:10,fontWeight:700,color:C.rd,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}}>⚠ Pendente</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{miss.map(m=><Pill key={m} color="red">{m}</Pill>)}</div></div>}
              {done.length>0&&<div><div style={{fontSize:10,fontWeight:700,color:C.gr,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}}>✓ Emitido</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{done.map(d=><Pill key={d} color="green">{d}</Pill>)}</div></div>}
            </div>
            <DocCheck docs={p.docs||{}} compact/>
          </div>;})}
        </div>
      </div>}

      {/* RECEBIMENTOS */}
      {tab==="recebimentos"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800}}>💰 Controle de Recebimentos</h2></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:24}}>
          <KPI icon="🇺🇸" label="A Receber USD" value={"$"+totalUSD.toLocaleString("pt-BR")} color="blue"/>
          <KPI icon="🇪🇺" label="A Receber EUR" value={"€"+totalEUR.toLocaleString("pt-BR")} color="blue"/>
          <KPI icon="🔴" label="Vencidos" value={tVenc>0?"$"+tVenc.toLocaleString("pt-BR"):"/bin/sh"} sub={} color={tVenc>0?"red":"green"}/>
          <KPI icon="📅" label="Este Mês" value={tMes>0?"$"+tMes.toLocaleString("pt-BR"):"/bin/sh"} sub={} color="amber"/>
        </div>
        {venc.length>0&&<div style={{marginBottom:24}}><div style={{fontWeight:700,color:C.rd,fontSize:14,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>🔴 Vencidos <Pill color="red">{venc.length}</Pill></div><Tabela rows={venc} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>}
        <div style={{marginBottom:24}}><div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📅 A receber em {TODAY.toLocaleString("pt-BR",{month:"long",year:"numeric"})}</div><Tabela rows={mes.sort((a,b)=>new Date(a.pgm)-new Date(b.pgm))} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>
        <div><div style={{fontWeight:700,color:C.sub,fontSize:14,marginBottom:10}}>📋 Todos os Pendentes</div><Tabela rows={data.filter(p=>p.status!=="PAGO").sort((a,b)=>new Date(a.pgm||"9999")-new Date(b.pgm||"9999"))} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>
      </div>}

      {/* TODOS */}
      {tab==="todos"&&<div>
        <div style={{marginBottom:16}}><h2 style={{fontSize:18,fontWeight:800}}>📋 Todos os Processos</h2></div>
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <input placeholder="🔍 Buscar por proforma, cliente ou produto..." value={busca} onChange={e=>setBusca(e.target.value)} style={{border:,borderRadius:8,padding:"9px 14px",fontSize:13,flex:1,minWidth:200,fontFamily:"inherit",outline:"none",background:C.w}}/>
          <select value={fCli} onChange={e=>setFCli(e.target.value)} style={{border:,borderRadius:8,padding:"9px 12px",fontSize:13,fontFamily:"inherit",background:C.w}}>{clientes.map(c=><option key={c}>{c}</option>)}</select>
          <select value={fSt} onChange={e=>setFSt(e.target.value)} style={{border:,borderRadius:8,padding:"9px 12px",fontSize:13,fontFamily:"inherit",background:C.w}}><option value="Todos">Todos os status</option>{SOPT.map(s=><option key={s}>{s}</option>)}</select>
        </div>
        <Tabela rows={lista} cols={{prontidao:true,carg:true,pgm:true,docs:true,nf:true,status:true}} onEdit={setModal}/>
        <div style={{marginTop:10,fontSize:11,color:C.mu,textAlign:"right"}}>{lista.length} de {data.length} processos</div>
      </div>}

    </div>}
    {modal&&<Modal proc={modal} onClose={()=>setModal(null)} onSave={saveP} loading={saving}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
