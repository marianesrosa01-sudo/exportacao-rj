function Badge({status}){const s=SS[status]||SS["PENDENTE"];return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}><span style={{width:5,height:5,borderRadius:"50%",background:s.d}}/>{status}</span>;}
function Pill({children,color="gray"}){const m={blue:{bg:"#eff6ff",c:"#1d4ed8",b:"#bfdbfe"},red:{bg:"#fef2f2",c:"#b91c1c",b:"#fecaca"},amber:{bg:"#fefce8",c:"#92400e",b:"#fde68a"},green:{bg:"#f0fdf4",c:"#15803d",b:"#bbf7d0"},gray:{bg:"#f1f5f9",c:"#475569",b:"#cbd5e1"}};const s=m[color]||m.gray;return <span style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;}
function DB({days}){if(days===null)return <span style={{color:C.mu,fontSize:12}}>—</span>;if(days<0)return <Pill color="red">{Math.abs(days)}d atraso</Pill>;if(days===0)return <Pill color="red">Hoje!</Pill>;if(days<=5)return <Pill color="red">{days}d</Pill>;if(days<=15)return <Pill color="amber">{days}d</Pill>;return <Pill color="green">{days}d</Pill>;}

  return <div onClick={onClick} style={{background:C.w,border:`1px solid ${C.bd}`,borderRadius:12,padding:"18px 20px",cursor:onClick?"pointer":"default",transition:"box-shadow .15s"}}

// ── DocCheck ──────────────────────────────────────────────────────
function DocCheck({docs,onChange,compact}){
  if(!docs)return null;
  const isTere="anexoVII" in docs;
  const total=Object.keys(docs).length,feitos=Object.values(docs).filter(Boolean).length,pct=total>0?Math.round(feitos/total*100):0;
  if(compact)return <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:40,height:4,background:"#e2e8f0",borderRadius:4}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#22c55e":pct>60?"#f59e0b":"#ef4444",borderRadius:4}}/></div><span style={{fontSize:10,color:C.mu,fontWeight:600}}>{feitos}/{total}</span></div>;
  const grupos=[{t:"Comerciais",keys:["invoice","packing"]},{t:"Regulatórios",keys:["co","ca","due",...("pallet" in docs?["pallet"]:[])]}, ...(isTere?[{t:"Específicos Terebintina",keys:["anexoVII","mdgf","dca"]}]:[])];
  return <div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"10px 14px",background:"#f8fafc",borderRadius:8}}><div style={{flex:1,height:6,background:"#e2e8f0",borderRadius:4}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#22c55e":pct>60?"#f59e0b":"#ef4444",borderRadius:4,transition:"width .3s"}}/></div><span style={{fontSize:12,fontWeight:700,color:C.sub,whiteSpace:"nowrap"}}>{feitos}/{total} docs ({pct}%)</span></div>{grupos.map(g=><div key={g.t} style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:C.mu,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{g.t}</div>{g.keys.filter(k=>k in docs).map(k=><label key={k} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"8px 12px",borderRadius:8,background:docs[k]?"#f0fdf4":"#f8fafc",border:`1px solid ${docs[k]?"#bbf7d0":C.bd}`,marginBottom:5,transition:"all .15s"}}><input type="checkbox" checked={docs[k]} onChange={e=>onChange&&onChange(k,e.target.checked)} style={{accentColor:"#22c55e",width:15,height:15}}/><span style={{fontSize:13,fontWeight:500,color:docs[k]?"#15803d":C.sub}}>{LDOC[k]}</span>{docs[k]&&<span style={{marginLeft:"auto",fontSize:11,color:"#22c55e",fontWeight:700}}>✓ Emitido</span>}</label>)}</div>)}</div>;
}

// ── Arquivos ──────────────────────────────────────────────────────
function Arquivos({processoId}){
  const [arqs,setArqs]=useState([]);const [loading,setLoading]=useState(false);const [uploading,setUploading]=useState(false);const fileRef=useRef();
  useEffect(()=>{if(processoId)load();},[processoId]);
  const load=async()=>{setLoading(true);const{data}=await sb.from("arquivos").select("*").eq("processo_id",processoId).order("created_at");if(data)setArqs(data);setLoading(false);};
  const upload=async(e)=>{const files=Array.from(e.target.files);setUploading(true);for(const file of files){const path=`${processoId}/${Date.now()}_${file.name}`;const{error}=await sb.storage.from("arquivos").upload(path,file);if(!error){const{data:u}=sb.storage.from("arquivos").getPublicUrl(path);await sb.from("arquivos").insert({processo_id:processoId,nome:file.name,tamanho:file.size,tipo:file.type,url:u.publicUrl});}}await load();setUploading(false);e.target.value="";};
  const remover=async(arq)=>{if(!window.confirm(`Remover ${arq.nome}?`))return;await sb.from("arquivos").delete().eq("id",arq.id);setArqs(a=>a.filter(x=>x.id!==arq.id));};
  const icon=t=>t?.startsWith("image/")?"🖼":t==="application/pdf"?"📕":t?.includes("excel")||t?.includes("spreadsheet")?"📗":t?.includes("word")?"📘":"📎";
  if(!processoId)return <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:8,padding:"12px 16px",fontSize:12,color:"#92400e"}}>💡 Salve o processo primeiro para anexar arquivos.</div>;
  return <div>
    <div onClick={()=>!uploading&&fileRef.current.click()} style={{border:`2px dashed ${C.bd}`,borderRadius:10,padding:"28px 20px",textAlign:"center",cursor:"pointer",marginBottom:14,background:"#fafafa",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.bl} onMouseLeave={e=>e.currentTarget.style.borderColor=C.bd}>
      <div style={{fontSize:30,marginBottom:8}}>{uploading?"⏳":"📎"}</div>
      <div style={{color:C.sub,fontSize:13,fontWeight:600}}>{uploading?"Enviando arquivos...":"Clique para anexar arquivos"}</div>
      <div style={{color:C.mu,fontSize:11,marginTop:4}}>PDF, imagens, Excel, Word — até 50MB cada</div>
    </div>
    <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={upload}/>
    {loading&&<div style={{textAlign:"center",color:C.mu,padding:20}}>Carregando...</div>}
    {!loading&&arqs.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:13,padding:20}}>Nenhum arquivo anexado ainda</div>}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {arqs.map(arq=><div key={arq.id} style={{display:"flex",alignItems:"center",gap:10,border:`1px solid ${C.bd}`,borderRadius:8,padding:"10px 14px",background:C.w}}>
        <span style={{fontSize:22}}>{icon(arq.tipo)}</span>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:C.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{arq.nome}</div><div style={{fontSize:11,color:C.mu}}>{arq.tamanho?(arq.tamanho/1024).toFixed(1)+" KB":""} · {new Date(arq.created_at).toLocaleDateString("pt-BR")}</div></div>
        <a href={arq.url} target="_blank" rel="noreferrer" style={{background:"#eff6ff",color:C.bl,border:"1px solid #bfdbfe",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:600,textDecoration:"none"}}>⬇ Baixar</a>
        <button onClick={()=>remover(arq)} style={{background:"none",border:"none",color:C.mu,fontSize:16,cursor:"pointer",padding:4}}>✕</button>
      </div>)}
    </div>
  </div>;
}

          {[["cliente","Cliente","text","1/span 2"],["produto","Produto","text","1/span 2"],["destino","País Destino","text"],["incoterm","Incoterm","inc"],["qtd","Quantidade","number"],["valor","Valor USD","number"],["prazo","Prazo Pgto (dias)","number"],["termos","Termos","ter"],["prontidao","Previsão Prontidão","date"],["carg","Data Carregamento","date"],["bl","Data BL","date"],["pgm","Prev. Pagamento","date"]].map(([k,lb,type,gc])=><div key={k} style={{gridColumn:gc}}><label style={lbl}>{lb}</label>{type==="inc"?<select value={f[k]||"FOB"} onChange={e=>set(k,e.target.value)} style={inp}>{["FOB","CIF","CFR","EXW","DAP","DDP"].map(o=><option key={o}>{o}</option>)}</select>:type==="ter"?<select value={f[k]||"DIAS DO BL"} onChange={e=>set(k,e.target.value)} style={inp}>{["DIAS DO BL","NO BL","100% ANTECIPADO","50% ANTECIPADO","PARCELADO"].map(o=><option key={o}>{o}</option>)}</select>:<input type={type} value={f[k]||""} onChange={e=>set(k,e.target.value)} style={inp}/>}</div>)}
          <div style={{gridColumn:"1/span 2"}}><label style={lbl}>Status Pagamento</label><select value={f.status} onChange={e=>set("status",e.target.value)} style={inp}>{SOPT.map(s=><option key={s}>{s}</option>)}</select></div>
          <div style={{gridColumn:"1/span 2"}}><label style={lbl}>Obs. Prazos/Pagamentos</label><textarea value={f.obs_prazo||""} onChange={e=>set("obs_prazo",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></div>
          <div style={{gridColumn:"1/span 2"}}><label style={lbl}>Obs. Gerais</label><textarea value={f.obs||""} onChange={e=>set("obs",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></div>
        </div>}
        {st==="docs"&&<DocCheck docs={f.docs} onChange={setD}/>}
        {st==="arquivos"&&<Arquivos processoId={f.id}/>}
      </div>
      {/* footer */}
      <div style={{padding:"16px 24px",borderTop:`1px solid ${C.bd}`,display:"flex",gap:8,justifyContent:"flex-end",background:"#fafafa",borderRadius:"0 0 16px 16px"}}>
        <button onClick={onClose} style={{background:C.w,color:C.sub,border:`1px solid ${C.bd}`,borderRadius:8,padding:"9px 20px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
        <button onClick={()=>onSave(f)} disabled={loading} style={{background:C.bl,color:"#fff",border:"none",borderRadius:8,padding:"9px 22px",fontWeight:700,fontSize:13,cursor:"pointer"}}>{loading?"Salvando...":"Salvar Processo"}</button>
      </div>
    </div>
  </div>;
}

// ── Tabela ────────────────────────────────────────────────────────
function Tabela({rows,cols={},onEdit}){
  if(!rows.length)return <div style={{textAlign:"center",padding:48,color:C.mu,fontSize:13}}>Nenhum processo encontrado</div>;
  const TH=({ch})=><th style={{padding:"10px 14px",fontSize:11,fontWeight:700,color:C.mu,textTransform:"uppercase",letterSpacing:.6,textAlign:"left",borderBottom:`1px solid ${C.bd}`,background:"#fafafa",whiteSpace:"nowrap"}}>{ch}</th>;
  const TD=({children,s})=><td style={{padding:"11px 14px",borderBottom:`1px solid #f1f5f9`,verticalAlign:"middle",fontSize:13,...s}}>{children}</td>;
  return <div style={{overflowX:"auto",borderRadius:10,border:`1px solid ${C.bd}`}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>
    <TH ch="Proforma"/><TH ch="Cliente"/><TH ch="Produto"/>
    {cols.prontidao&&<TH ch="Prontidão"/>}
    <TH ch="Valor"/>
    {cols.carg&&<TH ch="Carregamento"/>}
    {cols.pgm&&<TH ch="Pgto Prev."/>}
    {cols.dias&&<TH ch="Vence em"/>}
    {cols.docs&&<TH ch="Docs"/>}
    {cols.status&&<TH ch="Status"/>}
    <TH ch=""/>
  </tr></thead><tbody>
    {rows.map((p,i)=><tr key={p.id||p.proforma} style={{background:i%2===0?C.w:"#fafafa",cursor:"pointer",transition:"background .1s"}} onClick={()=>onEdit(p)} onMouseEnter={e=>e.currentTarget.style.background="#f0f7ff"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?C.w:"#fafafa"}>
      <TD><span style={{color:C.bl,fontWeight:700,fontSize:12}}>{p.proforma}</span><div style={{fontSize:10,color:C.mu,marginTop:1}}>{p.empresa}</div></TD>
      <TD s={{fontWeight:600}}>{p.cliente}</TD>
      <TD s={{color:C.sub,maxWidth:160}}><span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160}}>{p.produto}</span></TD>
      {cols.prontidao&&<TD>{p.prontidao?<span style={{fontSize:12}}>{fDate(p.prontidao)}</span>:<Pill color="amber">Indefinida</Pill>}</TD>}
      <TD s={{fontWeight:700,color:C.gr}}>{fUSD(p.valor)}</TD>
      {cols.carg&&<TD>{p.carg?<span style={{fontSize:12,color:C.sub}}>{fDate(p.carg)}</span>:<Pill color="red">Sem reserva</Pill>}</TD>}
      {cols.pgm&&<TD s={{fontSize:12,color:C.sub}}>{fDate(p.pgm)}</TD>}
      {cols.dias&&<TD><DB days={dDiff(p.pgm)}/></TD>}
      {cols.docs&&<TD><DocCheck docs={p.docs||{}} compact/></TD>}
      {cols.status&&<TD><Badge status={p.status}/></TD>}
      <TD><button onClick={e=>{e.stopPropagation();onEdit(p);}} style={{background:"#f1f5f9",color:C.bl,border:"none",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Abrir</button></TD>
    </tr>)}
  </tbody></table></div>;
}

// ── Login ─────────────────────────────────────────────────────────
function Login(){
  const [email,setEmail]=useState("");const [senha,setSenha]=useState("");const [erro,setErro]=useState("");const [load,setLoad]=useState(false);
  const entrar=async()=>{setErro("");setLoad(true);const{error}=await sb.auth.signInWithPassword({email,password:senha});if(error)setErro("E-mail ou senha incorretos.");setLoad(false);};
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f8fafc 0%,#e0e7ff 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{background:"linear-gradient(135deg,#2563eb,#1d4ed8)",borderRadius:16,padding:"14px 18px",fontSize:32,display:"inline-block",marginBottom:14,boxShadow:"0 4px 16px rgba(37,99,235,.3)"}}>🌊</div>
        <div style={{fontSize:22,fontWeight:800,color:C.tx}}>RJ & Alliance Exports</div>
        <div style={{fontSize:13,color:C.mu,marginTop:6}}>Controle de Exportação Marítima</div>
      </div>
      <div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:C.sub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.6}}>E-mail</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" onKeyDown={e=>e.key==="Enter"&&entrar()} style={{width:"100%",boxSizing:"border-box",border:`1.5px solid ${C.bd}`,borderRadius:10,padding:"11px 14px",fontSize:14,fontFamily:"inherit",outline:"none",transition:"border-color .15s"}} onFocus={e=>e.target.style.borderColor=C.bl} onBlur={e=>e.target.style.borderColor=C.bd}/></div>
      <div style={{marginBottom:22}}><label style={{fontSize:11,fontWeight:700,color:C.sub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.6}}>Senha</label><input type="password" value={senha} onChange={e=>setSenha(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&entrar()} style={{width:"100%",boxSizing:"border-box",border:`1.5px solid ${C.bd}`,borderRadius:10,padding:"11px 14px",fontSize:14,fontFamily:"inherit",outline:"none",transition:"border-color .15s"}} onFocus={e=>e.target.style.borderColor=C.bl} onBlur={e=>e.target.style.borderColor=C.bd}/></div>
      {erro&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 14px",fontSize:13,color:C.rd,marginBottom:16}}>{erro}</div>}
      <button onClick={entrar} disabled={load} style={{width:"100%",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:"0 4px 12px rgba(37,99,235,.3)"}}>{load?"Entrando...":"Entrar"}</button>
    </div>
  </div>;
}

// ── App ───────────────────────────────────────────────────────────
function App(){

  useEffect(()=>{if(session)loadData();},[session]);

  const loadData=async()=>{setDbLoad(true);const{data:rows,error}=await sb.from("processos").select("*").order("created_at");if(!error&&rows){if(rows.length===0)seedData();else setData(rows);}setDbLoad(false);};
  const seedData=async()=>{const ins=SEED.map(p=>({...p,docs:docsIni(p.produto)}));const{data:r}=await sb.from("processos").insert(ins).select();if(r)setData(r);};
  const saveP=async(proc)=>{setSaving(true);if(proc.id){const{id,created_at,...rest}=proc;const{data:u}=await sb.from("processos").update({...rest,updated_at:new Date().toISOString()}).eq("id",id).select().single();if(u)setData(d=>d.map(p=>p.id===id?u:p));}else{const{id:_,...rest}=proc;const{data:i}=await sb.from("processos").insert({...rest,docs:docsIni(proc.produto)}).select().single();if(i)setData(d=>[...d,i]);}setSaving(false);setModal(null);};

  const sRes=data.filter(semRes);

  const tPend=data.filter(p=>p.status!=="PAGO").reduce((a,p)=>a+(p.valor||0),0);
  const tVenc=venc.reduce((a,p)=>a+(p.valor||0),0);
  const tMes=mes.reduce((a,p)=>a+(p.valor||0),0);

  const clientes=useMemo(()=>["Todos",...Array.from(new Set(data.map(p=>p.cliente))).sort()],[data]);
  const lista=useMemo(()=>data.filter(p=>{const q=busca.toLowerCase();return(fCli==="Todos"||p.cliente===fCli)&&(fSt==="Todos"||p.status===fSt)&&(!busca||p.proforma?.toLowerCase().includes(q)||p.cliente?.toLowerCase().includes(q)||p.produto?.toLowerCase().includes(q));}),[data,busca,fCli,fSt]);

  const emptyP={empresa:"RJ",proforma:"",cliente:"",produto:"",qtd:0,valor:0,carg:null,bl:null,prazo:45,termos:"DIAS DO BL",pgm:null,status:"PENDENTE",prontidao:null,incoterm:"FOB",destino:"",obs_prazo:"",obs:"",docs:{}};

  if(authLoad)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.mu,fontSize:14}}>Carregando...</div>;
  if(!session)return <Login/>;

  // ── dashboard sub-tabs ──
  const DTABS=[
    {id:"geral",label:"Visão Geral"},

    {id:"financeiro",label:"Financeiro"},
    {id:"clientes",label:"Por Cliente"},

  return <div style={{minHeight:"100vh",background:C.bg}}>

      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{background:"linear-gradient(135deg,#2563eb,#1d4ed8)",borderRadius:8,padding:"6px 10px",fontSize:18}}>🌊</div>
        <div><div style={{fontWeight:800,fontSize:15,color:C.tx}}>RJ & Alliance Exports</div><div style={{fontSize:10,color:C.mu}}>{session.user.email}</div></div>

            {Object.entries(data.reduce((a,p)=>{a[p.cliente]=(a[p.cliente]||0)+(p.valor||0);return a},{})).sort((a,b)=>b[1]-a[1]).map(([cli,val])=>{const pct=tGeral>0?val/tGeral*100:0;return <div key={cli} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div style={{width:120,fontSize:13,fontWeight:600,color:C.tx,flexShrink:0}}>{cli}</div>
              <div style={{flex:1,height:6,background:"#f1f5f9",borderRadius:4}}><div style={{height:"100%",width:`${pct}%`,background:C.bl,borderRadius:4}}/></div>
              <div style={{width:90,textAlign:"right",fontSize:13,fontWeight:700,color:C.gr,flexShrink:0}}>{fUSD(val)}</div>
              <div style={{width:40,textAlign:"right",fontSize:11,color:C.mu,flexShrink:0}}>{pct.toFixed(0)}%</div>
            </div>;})}
          </div>
        </div>}
      </div>}

      {/* ═══ BOOKING ═══ */}
      {tab==="booking"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800,color:C.tx}}>🚢 Booking Pendente</h2><p style={{fontSize:13,color:C.mu,marginTop:4}}>Processos sem data de carregamento e sem BL confirmado</p></div>
        {sRes.length>0&&<div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>⚠️</span>
          <div><span style={{fontWeight:700,color:"#c2410c",fontSize:13}}>{sRes.length} processo{sRes.length>1?"s":""} aguardando reserva</span><span style={{color:C.sub,fontSize:12,marginLeft:8}}>Valor total: {fUSD(sRes.reduce((a,p)=>a+(p.valor||0),0))}</span></div>
        </div>}
        <Tabela rows={sRes} cols={{prontidao:true,carg:true,docs:true}} onEdit={setModal}/>
      </div>}

      {/* ═══ DOCS ═══ */}
      {tab==="docs"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800,color:C.tx}}>📄 Documentos Pendentes</h2><p style={{fontSize:13,color:C.mu,marginTop:4}}>Clique em qualquer processo para atualizar o checklist</p></div>
        {sDocs.length===0&&<div style={{textAlign:"center",padding:60,color:C.mu}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontWeight:700,fontSize:15}}>Todos os documentos em dia!</div></div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {sDocs.map(p=>{const miss=Object.entries(p.docs||{}).filter(([,v])=>!v).map(([k])=>LDOC[k]);const done=Object.entries(p.docs||{}).filter(([,v])=>v).map(([k])=>LDOC[k]);return <div key={p.id} onClick={()=>setModal(p)} style={{background:C.w,border:`1px solid ${C.bd}`,borderRadius:10,padding:"16px 20px",cursor:"pointer",transition:"box-shadow .15s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.06)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div><span style={{color:C.bl,fontWeight:700,fontSize:13}}>{p.proforma}</span><span style={{color:C.sub,marginLeft:10,fontSize:13}}>{p.cliente}</span><span style={{color:C.mu,marginLeft:8,fontSize:12}}>{p.produto}</span></div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontWeight:700,color:C.gr,fontSize:13}}>{fUSD(p.valor)}</span><Badge status={p.status}/></div>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
              {miss.length>0&&<div><div style={{fontSize:10,fontWeight:700,color:C.rd,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}}>⚠ Pendente</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{miss.map(m=><Pill key={m} color="red">{m}</Pill>)}</div></div>}
              {done.length>0&&<div><div style={{fontSize:10,fontWeight:700,color:C.gr,textTransform:"uppercase",letterSpacing:.8,marginBottom:5}}>✓ Emitido</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{done.map(d=><Pill key={d} color="green">{d}</Pill>)}</div></div>}
            </div>
            <DocCheck docs={p.docs||{}} compact/>
          </div>;})}
        </div>
      </div>}

      {/* ═══ RECEBIMENTOS ═══ */}
      {tab==="recebimentos"&&<div>
        <div style={{marginBottom:20}}><h2 style={{fontSize:18,fontWeight:800,color:C.tx}}>💰 Controle de Recebimentos</h2></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:24}}>
          <KPI icon="🔴" label="Vencidos" value={fUSD(tVenc)} sub={`${venc.length} processos`} color={tVenc>0?"red":"green"}/>
          <KPI icon="📅" label="A receber no mês" value={fUSD(tMes)} sub={`${mes.length} processos`} color="amber"/>
          <KPI icon="⏳" label="Total a receber" value={fUSD(tPend)} sub={`${data.filter(p=>p.status!=="PAGO").length} processos`} color="blue"/>
        </div>
        {venc.length>0&&<div style={{marginBottom:24}}><div style={{fontWeight:700,color:C.rd,fontSize:14,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>🔴 Vencidos <Pill color="red">{venc.length}</Pill></div><Tabela rows={venc} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>}
        <div style={{marginBottom:24}}><div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📅 A receber em {TODAY.toLocaleString("pt-BR",{month:"long",year:"numeric"})}</div><Tabela rows={mes.sort((a,b)=>new Date(a.pgm)-new Date(b.pgm))} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>
        <div><div style={{fontWeight:700,color:C.sub,fontSize:14,marginBottom:10}}>📋 Todos os Pendentes</div><Tabela rows={data.filter(p=>p.status!=="PAGO").sort((a,b)=>new Date(a.pgm||"9999")-new Date(b.pgm||"9999"))} cols={{pgm:true,dias:true,status:true}} onEdit={setModal}/></div>
      </div>}

      {/* ═══ TODOS ═══ */}
      {tab==="todos"&&<div>
        <div style={{marginBottom:16}}><h2 style={{fontSize:18,fontWeight:800,color:C.tx}}>📋 Todos os Processos</h2></div>
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <input placeholder="🔍 Buscar por proforma, cliente ou produto..." value={busca} onChange={e=>setBusca(e.target.value)} style={{border:`1px solid ${C.bd}`,borderRadius:8,padding:"9px 14px",fontSize:13,flex:1,minWidth:200,fontFamily:"inherit",outline:"none",background:C.w}}/>
          <select value={fCli} onChange={e=>setFCli(e.target.value)} style={{border:`1px solid ${C.bd}`,borderRadius:8,padding:"9px 12px",fontSize:13,fontFamily:"inherit",background:C.w,color:C.tx}}>{clientes.map(c=><option key={c}>{c}</option>)}</select>
          <select value={fSt} onChange={e=>setFSt(e.target.value)} style={{border:`1px solid ${C.bd}`,borderRadius:8,padding:"9px 12px",fontSize:13,fontFamily:"inherit",background:C.w,color:C.tx}}><option value="Todos">Todos os status</option>{SOPT.map(s=><option key={s}>{s}</option>)}</select>
        </div>
        <Tabela rows={lista} cols={{prontidao:true,carg:true,pgm:true,docs:true,status:true}} onEdit={setModal}/>
        <div style={{marginTop:10,fontSize:11,color:C.mu,textAlign:"right"}}>{lista.length} de {data.length} processos · Total: {fUSD(lista.reduce((a,p)=>a+(p.valor||0),0))}</div>
      </div>}

    </div>}

    {modal&&<Modal proc={modal} onClose={()=>setModal(null)} onSave={saveP} loading={saving}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
